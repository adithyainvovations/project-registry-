<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Projects - Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>ProjectRegistry</h1>
        </div>
        <nav class="center-nav">
            <a href="index.html">Home</a>
            <a href="upload.html">Upload</a>
            <a href="view.html" class="active">Projects</a>
            <a href="duplicate.html">Duplicates</a>
        </nav>
        <div class="header-right">
            <a href="admin.html">Admin</a>
            <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
        </div>
    </header>

    <main>
        <div class="card">
            <div class="d-flex justify-between align-center mb-3">
                <h2>Projects</h2>
                <div style="width: 300px;">
                    <input type="text" id="searchInput" placeholder="Search by title or name..." onkeyup="filterProjects()">
                </div>
            </div>

            <div class="table-container">
                <table id="projectsTable">
                    <thead>
                        <tr>
                            <th>Reg No</th>
                            <th>Student Name</th>
                            <th>Project Title</th>
                            <th>Description</th>
                            <th>Date</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" class="text-center text-muted"><span class="spinner"></span> Loading projects...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        let allProjects = [];

        async function loadProjects() {
            try {
                allProjects = await api.getProjects();
                renderTable(allProjects);
            } catch (error) {
                document.getElementById('tableBody').innerHTML = `
                    <tr><td colspan="6" class="text-center text-error">Failed to load projects. Ensure backend is running.</td></tr>
                `;
            }
        }

        function renderTable(projects) {
            const tbody = document.getElementById('tableBody');
            if (projects.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted">No projects found.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = projects.map(p => `
                <tr>
                    <td>${p.register_no}</td>
                    <td>${p.student_name}</td>
                    <td><strong>${p.title}</strong></td>
                    <td style="max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${p.description}">${p.description}</td>
                    <td class="text-muted">${p.submission_date}</td>
                    <td class="text-muted">${p.submission_time}</td>
                </tr>
            `).join('');
        }

        function filterProjects() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProjects.filter(p => 
                p.title.toLowerCase().includes(term) || 
                p.student_name.toLowerCase().includes(term) ||
                p.register_no.toLowerCase().includes(term)
            );
            renderTable(filtered);
        }

        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
</body>
</html>
