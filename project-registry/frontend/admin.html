<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>Registry<span style="font-size: 0.8rem; color: var(--text-muted); margin-left: 10px;">ADMIN</span></h1>
        </div>
        <nav class="center-nav">
            <a href="index.html">Home</a>
            <a href="upload.html">Upload</a>
            <a href="view.html">Browse</a>
            <a href="duplicate.html">Duplicates</a>
        </nav>
        <div class="header-right">
            <a href="admin.html" class="active">Admin</a>
            <a href="#"><i class="fa-solid fa-user-lock"></i></a>
        </div>
    </header>

    <main>
        <!-- Login Section -->
        <div id="loginSection" class="card" style="max-width: 400px; margin: 4rem auto;">
            <h2 class="mb-3 text-center">Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboardSection" class="hidden">
            <div class="d-flex justify-between align-center mb-3">
                <h2>Admin Dashboard</h2>
                <div class="d-flex gap-2">
                    <button class="btn btn-secondary" onclick="exportData()"><i class="fa-solid fa-download"></i> Export CSV</button>
                    <button class="btn btn-secondary" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="card table-container">
                <table id="adminTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Reg No</th>
                            <th>Student</th>
                            <th>Title</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <tr><td colspan="6" class="text-center text-muted"><span class="spinner"></span> Loading projects...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h3 class="mb-3">Edit Project</h3>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="grid-2">
                    <div class="form-group">
                        <label>Register No</label>
                        <input type="text" id="editRegNo" required>
                    </div>
                    <div class="form-group">
                        <label>Student Name</label>
                        <input type="text" id="editStudentName" required>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Submission Date</label>
                        <input type="date" id="editSubDate" required>
                    </div>
                    <div class="form-group">
                        <label>Submission Time</label>
                        <input type="time" id="editSubTime" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="editDescription" required></textarea>
                </div>
                <div class="d-flex justify-between mt-3">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Simple hardcoded auth
        const ADMIN_USER = 'Adithya';
        const ADMIN_PASS = 'iamnandhu@1230';
        
        let allProjects = [];

        // Check if logged in
        if (sessionStorage.getItem('adminLogged') === 'true') {
            showDashboard();
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            if (u === ADMIN_USER && p === ADMIN_PASS) {
                sessionStorage.setItem('adminLogged', 'true');
                showDashboard();
                showToast('Logged in successfully');
            } else {
                showToast('Invalid credentials', 'error');
            }
        });

        function logout() {
            sessionStorage.removeItem('adminLogged');
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('loginForm').reset();
        }

        function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            loadAdminProjects();
        }

        async function loadAdminProjects() {
            try {
                allProjects = await api.getProjects();
                renderAdminTable();
            } catch (error) {
                showToast('Failed to load projects', 'error');
            }
        }

        function renderAdminTable() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = allProjects.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.register_no}</td>
                    <td>${p.student_name}</td>
                    <td>${p.title}</td>
                    <td style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${p.description}">${p.description}</td>
                    <td>
                        <button class="btn btn-secondary" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;" onclick='openEditModal(${JSON.stringify(p).replace(/'/g, "&#39;")})'><i class="fa-solid fa-pen"></i></button>
                        <button class="btn btn-danger" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;" onclick="deleteProject(${p.id})"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function exportData() {
            window.open(api.getExportUrl(), '_blank');
        }

        async function deleteProject(id) {
            if (confirm('Are you sure you want to delete this project?')) {
                try {
                    await api.deleteProject(id);
                    showToast('Project deleted', 'success');
                    loadAdminProjects();
                } catch (error) {
                    showToast(error.message, 'error');
                }
            }
        }

        function openEditModal(project) {
            document.getElementById('editId').value = project.id;
            document.getElementById('editRegNo').value = project.register_no;
            document.getElementById('editStudentName').value = project.student_name;
            document.getElementById('editSubDate').value = project.submission_date;
            document.getElementById('editSubTime').value = project.submission_time;
            document.getElementById('editTitle').value = project.title;
            document.getElementById('editDescription').value = project.description;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                register_no: document.getElementById('editRegNo').value,
                student_name: document.getElementById('editStudentName').value,
                submission_date: document.getElementById('editSubDate').value,
                submission_time: document.getElementById('editSubTime').value,
                title: document.getElementById('editTitle').value,
                description: document.getElementById('editDescription').value
            };

            try {
                await api.updateProject(id, data);
                showToast('Project updated successfully', 'success');
                closeEditModal();
                loadAdminProjects();
            } catch (error) {
                showToast(error.message, 'error');
            }
        });
    </script>
</body>
</html>
